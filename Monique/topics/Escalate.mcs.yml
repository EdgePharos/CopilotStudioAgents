mcs.metadata:
  componentName: Eskalera
  description: |-
    Det här systemämnet utlöses när användaren anger att den vill tala med en representant.
    Du kan konfigurera hur agenten ska hantera överlämningen till mänskliga handläggare i agentens inställningar.
    Om agenten inte hanterar eskaleringar ska det här avsnittet inaktiveras.
kind: AdaptiveDialog
startBehavior: CancelOtherTopics
