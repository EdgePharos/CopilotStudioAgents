  actions:
    - kind: SendActivity
      id: sendMessage_s39DCt
      conversationOutcome: Escalated
      activity: |-
        För denna copilot är det inte konfigurerat att eskalera till en representant, men det är här som agenten kan ge information om hur man tar kontakt med någon annan på något annat sätt.

        Finns det något annat jag kan hjälpa dig med?