mcs.metadata:
  componentName: Vid fel
  description: Det här systemämnet utlöses när agenten påträffar ett fel. Den fullständiga felbeskrivningen visas när testchattrutan används.
kind: AdaptiveDialog
startBehavior: UseLatestPublishedContentAndCancelOtherTopics
beginDialog:
  kind: OnError
  id: main
  actions:
    - kind: SetVariable
      id: setVariable_timestamp
      variable: init:Topic.CurrentTime
      value: =Text(Now(), DateTimeFormat.UTC)

    - kind: ConditionGroup
      id: condition_1
      conditions:
        - id: bL4wmY
          condition: =System.Conversation.InTestMode = true
          actions:
            - kind: SendActivity
              id: sendMessage_XJBYMo
              activity: |-
                Felmeddelande: {System.Error.Message}
                Felkod: {System.Error.Code}
                Konversations-ID: {System.Conversation.Id}
                Tid (UTC): {Topic.CurrentTime}

      elseActions:
        - kind: SendActivity
          id: sendMessage_dZ0gaF
          activity:
            text:
              - |-
                Ett fel har inträffat.
                Felkod: {System.Error.Code}
                Konversations-ID: {System.Conversation.Id}
                Tid (UTC): {Topic.CurrentTime}.
            speak:
              - Ett fel har inträffat. Försök igen.

    - kind: LogCustomTelemetryEvent
      id: 9KwEAn
      eventName: OnErrorLog
      properties: "={ErrorMessage: System.Error.Message, ErrorCode: System.Error.Code, TimeUTC: Topic.CurrentTime, ConversationId: System.Conversation.Id}"

    - kind: CancelAllDialogs
      id: NW7NyY